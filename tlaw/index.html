<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Rodavarion TLAW 2.0</title>
  <style>
    :root {
      font-family: Inter, system-ui, sans-serif;
      color: #eef3f7;
      background: #071015;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px),
        #071015;
      background-size: 32px 32px;
    }

    main {
      width: min(760px, 100%);
      padding: clamp(28px, 6vw, 64px);
      border: 1px solid rgba(166,205,220,.22);
      border-radius: 24px;
      background: #0c171d;
      box-shadow: 0 32px 100px rgba(0,0,0,.45);
    }

    img {
      width: min(300px, 70%);
      height: auto;
      display: block;
      margin-bottom: 42px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(32px, 7vw, 62px);
      letter-spacing: -.045em;
    }

    p {
      color: #afc0c8;
      font-size: 18px;
      line-height: 1.65;
    }

    .status {
      margin-top: 32px;
      padding: 18px;
      border-radius: 14px;
      background: #071015;
      border: 1px solid rgba(166,205,220,.18);
      font-family: ui-monospace, monospace;
      overflow-wrap: anywhere;
    }

    .ok { color: #76e6ad; }
    .error { color: #ff9d9d; }

    a { color: #b7e6f6; }
  </style>
</head>
<body>
<main>
  <img src="/tlaw/assets/rodavarion-logo.webp"
       alt="Rodavarion Technologies">

  <h1>TLAW 2.0</h1>

  <p>
    Хмарне юридичне ядро Rodavarion переноситься на
    Cloudflare Pages Functions та D1.
  </p>

  <div id="status" class="status">
    Перевірка з’єднання з юридичною базою…
  </div>

  <p>
    <a href="/">Повернутися на головну сторінку</a>
  </p>
</main>

<script>
(async () => {
  const element = document.getElementById("status");

  try {
    const response = await fetch("/api/tlaw/health", {
      headers: { "accept": "application/json" }
    });

    const data = await response.json();

    if (!response.ok || !data.ok) {
      throw new Error(data.error || "API unavailable");
    }

    element.classList.add("ok");
    element.textContent =
      "Cloudflare API: працює · D1: працює · schema: " +
      data.schemaVersion;
  } catch (error) {
    element.classList.add("error");
    element.textContent =
      "Помилка перевірки хмарного ядра: " + error.message;
  }
})();
</script>
</body>
</html>
